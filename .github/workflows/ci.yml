name: CI

on:
  push:
    branches: [ "main", "copilot/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (x86 Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore WITPAE_Theater_Staff.sln

      - name: Build (x86 Release)
        run: dotnet build WITPAE_Theater_Staff.sln -c Release -p:Platform=x86 --no-restore

      - name: Run unit tests (x86 Release)
        run: >
          dotnet test WITPAE_Theater_Staff.sln
          -c Release -p:Platform=x86
          --no-build
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
